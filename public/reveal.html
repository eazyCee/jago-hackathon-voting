<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results Reveal - Jago Hackathon Voting</title>
  <!-- Tailwind Play CDN (v3.4) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Canvas Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3 {
      font-family: 'Outfit', sans-serif;
    }
    .mesh-bg {
      background-color: #05070f;
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 40%), 
        radial-gradient(at 100% 0%, rgba(244, 63, 94, 0.1) 0, transparent 40%),
        radial-gradient(at 50% 100%, rgba(120, 119, 198, 0.15) 0, transparent 50%);
    }
    /* Dynamic Absolute Positioning transition */
    .animated-card {
      transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease-in-out, border-color 0.5s ease;
    }
    .bar-transition {
      transition: width 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    }
  </style>
</head>
<body class="mesh-bg text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden">

  <!-- Header Section -->
  <header class="w-full px-8 py-5 flex justify-between items-center border-b border-slate-800/40 backdrop-blur-md sticky top-0 z-50 bg-slate-950/80">
    <div class="flex items-center space-x-3">
      <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-rose-500 to-amber-500 flex items-center justify-center font-extrabold text-white text-lg shadow-lg shadow-rose-500/20">J</div>
      <span class="text-lg font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Jago Hackathon 2026 Results</span>
    </div>
    <div class="flex items-center space-x-4">
      <div id="phaseIndicator" class="text-xs font-bold uppercase tracking-widest text-indigo-400 bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-full">
        PHASE 0: NEUTRAL GROUND
      </div>
      <button onclick="previousPhase()" class="p-2 bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-400 hover:text-white rounded-xl transition-all select-none" title="Previous Phase">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <button onclick="nextPhase()" class="px-5 py-2 bg-rose-500 hover:bg-rose-600 text-sm font-bold rounded-xl shadow-lg shadow-rose-500/20 transition-all flex items-center gap-2 select-none" id="controlBtn">
        Next Phase
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      </button>
    </div>
  </header>

  <!-- Presentation Deck View -->
  <main class="flex-grow max-w-5xl w-full mx-auto p-4 md:p-8 flex flex-col justify-start">
    
    <!-- Title banner -->
    <div class="text-center py-6 mb-4">
      <h2 class="text-2xl md:text-3xl font-extrabold bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent uppercase tracking-wider" id="revealTitle">
        Hackathon Leaderboard
      </h2>
      <p class="text-sm text-slate-500 mt-1.5" id="revealSubtitle">All teams are placed on equal neutral ground. Ready to reveal Criteria 1?</p>
    </div>

    <!-- Animated Leaderboard Container -->
    <div class="relative w-full" id="boardContainer" style="height: 640px;">
      <!-- JavaScript will absolute position the cards here -->
      <div id="revealLoader" class="absolute inset-0 flex items-center justify-center">
        <div class="h-12 w-12 border-4 border-slate-800 border-t-rose-500 rounded-full animate-spin"></div>
      </div>
    </div>

  </main>

  <!-- Instructions Floating Hint -->
  <div class="fixed bottom-4 left-4 z-40 text-[10px] text-slate-500 font-semibold tracking-wider uppercase bg-slate-950/70 backdrop-blur-md px-3 py-2 border border-slate-850 rounded-lg flex items-center gap-2 select-none pointer-events-none">
    <kbd class="px-1.5 py-0.5 bg-slate-900 border border-slate-800 rounded">Space</kbd> or <kbd class="px-1.5 py-0.5 bg-slate-900 border border-slate-800 rounded">&rarr;</kbd> to navigate
  </div>

  <!-- Footer -->
  <footer class="w-full text-center py-6 border-t border-slate-800/10 backdrop-blur-sm mt-8">
    <p class="text-xs text-slate-600 tracking-wide">&copy; 2026 Bank Jago Technology. Live Presentation System.</p>
  </footer>

  <script>
    let resultsData = [];
    let currentPhase = 0; // 0: Neutral, 1: Impact, 2: Innovation, 3: Functionality
    let teamCards = {}; // Map of team ID to element reference
    
    const cardHeight = 64; // height of a card
    const cardGap = 16;   // gap between cards

    const PHASE_CONFIGs = [
      {
        title: "Hackathon Leaderboard",
        subtitle: "All teams are placed on equal neutral ground. Ready to reveal Criteria 1?",
        indicator: "PHASE 0: NEUTRAL GROUND",
        scoreField: null,
        cumulativeField: null,
        btnText: "Reveal Impact Scores"
      },
      {
        title: "Criteria 1 Revealed",
        subtitle: "Evaluating Impact & Usefulness: Does it solve a genuine, high-value problem?",
        indicator: "PHASE 1: IMPACT & USEFULNESS REVEALED",
        scoreField: "c1",
        cumulativeField: "p1_cumulative",
        btnText: "Reveal Innovation Scores"
      },
      {
        title: "Criteria 2 Revealed",
        subtitle: "Evaluating Innovation & Creativity: Is the idea fresh and creative?",
        indicator: "PHASE 2: CUMULATIVE (IMPACT + INNOVATION)",
        scoreField: "c2",
        cumulativeField: "p2_cumulative",
        btnText: "Reveal Functionality Scores"
      },
      {
        title: "Final Hackathon Results",
        subtitle: "Evaluating Functionality & Demo: Celebrating our top innovators!",
        indicator: "PHASE 3: FINAL CUMULATIVE STANDINGS",
        scoreField: "c3",
        cumulativeField: "p3_cumulative",
        btnText: "Presentation Complete"
      }
    ];

    async function loadResults() {
      try {
        const res = await fetch('/api/results');
        if (!res.ok) {
          throw new Error("Unauthorized or server error");
        }
        resultsData = await res.json();
        
        // Remove loader and build board
        document.getElementById('revealLoader').remove();
        buildBoard();
        positionCards();
      } catch (err) {
        console.error('Failed to load results:', err);
        document.getElementById('boardContainer').innerHTML = `
          <div class="text-center py-20 text-rose-400 text-sm border border-rose-500/10 bg-rose-500/5 rounded-3xl p-8 max-w-md mx-auto">
            Failed to load results. Make sure you are logged in as an administrator/voter and try again.
          </div>
        `;
      }
    }

    // First time board render
    function buildBoard() {
      const container = document.getElementById('boardContainer');
      container.replaceChildren();

      // Set container height dynamically based on 8 cards
      container.style.height = `${(cardHeight + cardGap) * 8}px`;

      // Sort alphabetically/index first for neutral phase
      const sortedNeutral = [...resultsData].sort((a, b) => a.id.localeCompare(b.id));

      sortedNeutral.forEach((team) => {
        const card = document.createElement('div');
        card.id = `card_${team.id}`;
        card.className = 'absolute left-0 right-0 h-[64px] bg-slate-900/30 border border-slate-800/60 rounded-2xl flex items-center justify-between px-6 shadow-md animated-card overflow-hidden';
        
        card.innerHTML = `
          <!-- Rank & Info block -->
          <div class="flex items-center space-x-4">
            <div id="rank_${team.id}" class="h-10 w-10 flex-shrink-0 rounded-xl bg-slate-950 border border-slate-850 flex items-center justify-center font-extrabold text-slate-500 Outfit text-base transition-colors duration-500">
              -
            </div>
            <div>
              <h4 class="font-bold text-white tracking-wide text-sm md:text-base">${escapeHtml(team.name)}</h4>
              <div class="flex items-center space-x-1.5 text-[10px] font-bold text-slate-500 uppercase mt-0.5 tracking-wider" id="scoreSub_${team.id}">
                Neutral Standings
              </div>
            </div>
          </div>

          <!-- Score display and progress block -->
          <div class="flex items-center space-x-8">
            <!-- Criterion 1 Bar (Impact) -->
            <div class="hidden md:flex flex-col items-start w-28 text-left transition-all duration-500 opacity-20" id="barBox_c1_${team.id}">
              <span class="text-[9px] font-bold uppercase tracking-wider text-slate-500">Impact</span>
              <div class="w-full bg-slate-950 h-1.5 rounded-full mt-1 border border-slate-850 overflow-hidden">
                <div id="bar_c1_${team.id}" class="bg-rose-500 h-full w-0 bar-transition"></div>
              </div>
            </div>
            
            <!-- Criterion 2 Bar (Innovation) -->
            <div class="hidden md:flex flex-col items-start w-28 text-left transition-all duration-500 opacity-20" id="barBox_c2_${team.id}">
              <span class="text-[9px] font-bold uppercase tracking-wider text-slate-500">Innovation</span>
              <div class="w-full bg-slate-950 h-1.5 rounded-full mt-1 border border-slate-850 overflow-hidden">
                <div id="bar_c2_${team.id}" class="bg-indigo-500 h-full w-0 bar-transition"></div>
              </div>
            </div>

            <!-- Criterion 3 Bar (Functionality) -->
            <div class="hidden md:flex flex-col items-start w-28 text-left transition-all duration-500 opacity-20" id="barBox_c3_${team.id}">
              <span class="text-[9px] font-bold uppercase tracking-wider text-slate-500">Demo</span>
              <div class="w-full bg-slate-950 h-1.5 rounded-full mt-1 border border-slate-850 overflow-hidden">
                <div id="bar_c3_${team.id}" class="bg-amber-500 h-full w-0 bar-transition"></div>
              </div>
            </div>

            <!-- Cumulative Score Display -->
            <div class="flex flex-col items-end justify-center w-24">
              <span class="text-[9px] font-bold uppercase tracking-wider text-slate-500" id="scoreLabel_${team.id}">Revealing</span>
              <div class="text-lg font-black font-mono tracking-tight text-slate-500 transition-colors duration-500 mt-0.5" id="scoreText_${team.id}">
                0.0
              </div>
            </div>
          </div>
        `;

        container.appendChild(card);
        teamCards[team.id] = card;
      });
    }

    // Core sorting and repositioning algorithm
    function positionCards() {
      const config = PHASE_CONFIGs[currentPhase];
      
      // Update Texts
      document.getElementById('revealTitle').textContent = config.title;
      document.getElementById('revealSubtitle').textContent = config.subtitle;
      document.getElementById('phaseIndicator').textContent = config.indicator;
      document.getElementById('controlBtn').innerHTML = `
        ${config.btnText}
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      `;

      let sorted = [];
      if (currentPhase === 0) {
        // Neutral: sort by ID or index
        sorted = [...resultsData].sort((a, b) => a.id.localeCompare(b.id));
      } else {
        // Sort descending based on phase cumulative score. Secondary sort alphabetically for ties.
        sorted = [...resultsData].sort((a, b) => {
          return b[config.cumulativeField] - a[config.cumulativeField] || a.name.localeCompare(b.name);
        });
      }

      // Positions each element dynamically using translateY
      sorted.forEach((team, rankIndex) => {
        const card = teamCards[team.id];
        card.style.transform = `translateY(${rankIndex * (cardHeight + cardGap)}px)`;

        const rankBadge = document.getElementById(`rank_${team.id}`);
        const scoreText = document.getElementById(`scoreText_${team.id}`);
        const scoreLabel = document.getElementById(`scoreLabel_${team.id}`);
        const scoreSub = document.getElementById(`scoreSub_${team.id}`);

        // Format and visual updates based on Phase
        if (currentPhase === 0) {
          card.classList.remove('border-rose-500/30', 'border-indigo-500/30', 'border-amber-500/50', 'bg-gradient-to-r', 'from-amber-500/10', 'to-slate-900/40');
          card.classList.add('border-slate-800/60');
          rankBadge.textContent = '-';
          rankBadge.className = 'h-10 w-10 flex-shrink-0 rounded-xl bg-slate-950 border border-slate-850 flex items-center justify-center font-extrabold text-slate-500 Outfit text-base transition-colors duration-500';
          scoreText.textContent = '0.0';
          scoreText.className = 'text-lg font-black font-mono tracking-tight text-slate-500 mt-0.5';
          scoreLabel.textContent = 'Revealing';
          scoreSub.textContent = 'Neutral Standings';

          // Reset all bars
          ['c1', 'c2', 'c3'].forEach(c => {
            const bar = document.getElementById(`bar_${c}_${team.id}`);
            bar.style.width = '0%';
            document.getElementById(`barBox_${c}_${team.id}`).className = 'hidden md:flex flex-col items-start w-28 text-left transition-all duration-500 opacity-20';
          });

        } else {
          // Highlight ranks
          rankBadge.textContent = `#${rankIndex + 1}`;
          
          if (rankIndex === 0) {
            rankBadge.className = 'h-10 w-10 flex-shrink-0 rounded-xl bg-amber-500 text-slate-950 border border-transparent flex items-center justify-center font-black Outfit text-base transition-colors duration-500';
          } else if (rankIndex === 1) {
            rankBadge.className = 'h-10 w-10 flex-shrink-0 rounded-xl bg-slate-300 text-slate-950 border border-transparent flex items-center justify-center font-black Outfit text-base transition-colors duration-500';
          } else if (rankIndex === 2) {
            rankBadge.className = 'h-10 w-10 flex-shrink-0 rounded-xl bg-amber-700 text-white border border-transparent flex items-center justify-center font-black Outfit text-base transition-colors duration-500';
          } else {
            rankBadge.className = 'h-10 w-10 flex-shrink-0 rounded-xl bg-slate-950 border border-slate-800 text-slate-400 flex items-center justify-center font-bold Outfit text-base transition-colors duration-500';
          }

          // Cumulative value setting
          const revealedScore = team[config.cumulativeField];
          scoreText.textContent = revealedScore.toFixed(1);
          scoreText.className = 'text-xl font-black font-mono tracking-tight text-white mt-0.5';
          scoreLabel.textContent = `Total / ${currentPhase * 5}.0`;
          scoreSub.innerHTML = `<span class="text-rose-400">c1: ${team.c1.toFixed(1)}</span>` + 
                               (currentPhase >= 2 ? ` &middot; <span class="text-indigo-400">c2: ${team.c2.toFixed(1)}</span>` : '') + 
                               (currentPhase >= 3 ? ` &middot; <span class="text-amber-400">c3: ${team.c3.toFixed(1)}</span>` : '');

          // Highlight Border and background glow transitions
          card.classList.remove('border-slate-800/60');
          if (currentPhase === 1) {
            card.style.borderColor = `rgba(244, 63, 94, ${0.15 + (1 / (rankIndex + 1)) * 0.25})`; // rose glow scaling
          } else if (currentPhase === 2) {
            card.style.borderColor = `rgba(99, 102, 241, ${0.15 + (1 / (rankIndex + 1)) * 0.25})`; // indigo glow scaling
          } else if (currentPhase === 3) {
            if (rankIndex === 0) {
              card.className = 'absolute left-0 right-0 h-[64px] bg-gradient-to-r from-amber-500/10 to-slate-900/40 border border-amber-500/50 rounded-2xl flex items-center justify-between px-6 shadow-xl shadow-amber-500/5 animated-card overflow-hidden';
            } else {
              card.style.borderColor = `rgba(245, 158, 11, ${0.15 + (1 / (rankIndex + 1)) * 0.25})`; // amber glow scaling
            }
          }

          // Trigger horizontal progress filling
          for (let p = 1; p <= currentPhase; p++) {
            const key = `c${p}`;
            const box = document.getElementById(`barBox_${key}_${team.id}`);
            const bar = document.getElementById(`bar_${key}_${team.id}`);
            
            box.className = 'hidden md:flex flex-col items-start w-28 text-left transition-all duration-500 opacity-100';
            bar.style.width = `${(team[key] / 5.0) * 100}%`;
          }
        }
      });

      // Triggers Confetti celebration if final phase and standings complete
      if (currentPhase === 3) {
        triggerConfettiShower();
      }
    }

    function nextPhase() {
      if (currentPhase < 3) {
        currentPhase++;
        positionCards();
      } else {
        // Confetti burst on repeat click of final
        triggerConfettiShower();
      }
    }

    function previousPhase() {
      if (currentPhase > 0) {
        currentPhase--;
        positionCards();
      }
    }

    // High-end Confetti explosion
    function triggerConfettiShower() {
      const duration = 2.5 * 1000;
      const animationEnd = Date.now() + duration;
      const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      const interval = setInterval(function() {
        const timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
          return clearInterval(interval);
        }

        const particleCount = 50 * (timeLeft / duration);
        // Confetti from corners
        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
      }, 250);
    }

    // Keyboard handlers
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.key === 'ArrowRight') {
        e.preventDefault();
        nextPhase();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        previousPhase();
      }
    });

    // Helpers
    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    // Load results once page displays
    loadResults();
  </script>
</body>
</html>
